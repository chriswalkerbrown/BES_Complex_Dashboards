<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caribbean Weather Dashboard</title>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; background:#101419; color:#e8edf2; margin:0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .card { background:#17202a; border:1px solid #2a3440; border-radius:14px; padding:16px; margin-bottom:14px; }
    h1 { margin:0 0 6px 0; }
    .muted { opacity:.8; }
    .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .btn { background:#243243; border:1px solid #34465a; color:#e8edf2; padding:8px 12px; border-radius:10px; cursor:pointer; font-size:13px; }
    .btn.active { background:#2d6cdf; border-color:#2d6cdf; }
    .btn:hover:not(.active) { background:#2e3f55; }
    #rainRow { display:none; }
    img { width:100%; max-width:1060px; border-radius:10px; border:1px solid #2a3440; }
    .warn { color:#ffd479; }
    .section-label { font-size:12px; color:#7a8fa0; text-transform:uppercase;
                      letter-spacing:.06em; margin:10px 0 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Caribbean Weather Dashboard</h1>
      <div><strong>Last updated:</strong> 2026-03-29 21:23 UTC</div>
      <div class="muted">Data source: NAM (NOAA) &mdash; BES Islands region</div>
    </div>

    <div class="card">
      <div class="section-label">Forecast Hour</div>
      <div class="row" id="forecastButtons"><button class="btn" data-group="forecast" data-value="0h">0h</button><button class="btn" data-group="forecast" data-value="3h">3h</button><button class="btn" data-group="forecast" data-value="6h">6h</button><button class="btn" data-group="forecast" data-value="12h">12h</button><button class="btn" data-group="forecast" data-value="24h">24h</button><button class="btn" data-group="forecast" data-value="48h">48h</button><button class="btn" data-group="forecast" data-value="72h">72h</button></div>

      <div class="section-label" style="margin-top:14px;">Variable</div>
      <div class="row" id="layerButtons"><button class="btn" data-group="layer" data-value="Temperature">Temperature</button><button class="btn" data-group="layer" data-value="Wind">Wind</button><button class="btn" data-group="layer" data-value="Wet-bulb Temp">Wet-bulb Temp</button><button class="btn" data-group="layer" data-value="Latent Heat">Latent Heat</button><button class="btn" data-group="layer" data-value="Pressure">Pressure</button><button class="btn" data-group="layer" data-value="Evapotranspiration">Evapotranspiration</button><button class="btn" data-group="layer" data-value="Heat Fluxes">Heat Fluxes</button><button class="btn" data-group="layer" data-value="Rainfall">Rainfall</button></div>

      <div id="rainRow">
        <div class="section-label" style="margin-top:14px;">Rainfall Mode</div>
        <div class="row" id="rainButtons"><button class="btn" data-group="rain" data-value="Accumulated">Accumulated</button><button class="btn" data-group="rain" data-value="Rate">Rate</button></div>
      </div>
    </div>

    <div class="card">
      <h3 id="plotTitle"></h3>
      <div id="warning" class="warn" style="display:none;">No image available for this selection.</div>
      <img id="plotImage" alt="weather plot" />
      <div style="margin-top:8px"><strong>Updated:</strong> <span id="plotTs"></span></div>
    </div>
  </div>

  <script>
    const STATE = {"0h": {"Temperature": {"src": "static/region_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f00.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "3h": {"Temperature": {"src": "static/region_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f03.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "6h": {"Temperature": {"src": "static/region_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f06.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "12h": {"Temperature": {"src": "static/region_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f12.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "24h": {"Temperature": {"src": "static/region_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f24.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "48h": {"Temperature": {"src": "static/region_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f48.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}, "72h": {"Temperature": {"src": "static/region_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "2 m Temperature"}, "Wind": {"src": "static/wind_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "10 m Wind"}, "Wet-bulb Temp": {"src": "static/wetbulb_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Wet-bulb Temp (2 m, RH=80% assumed)"}, "Latent Heat": {"src": "static/latent_heat_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Surface Latent Heat Flux"}, "Pressure": {"src": "static/pressure_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Mean Sea-Level Pressure"}, "Evapotranspiration": {"src": "static/et_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Evapotranspiration (from LHTFL)"}, "Heat Fluxes": {"src": "static/heat_fluxes_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Latent & Sensible Heat Fluxes"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f72.png?v=1774819430", "ts": "2026-03-29 21:23 UTC", "title": "Rainfall Rate"}}}};
    const selected = { forecast: '0h', layer: 'Temperature', rain: 'Accumulated' };

    function setActive(group, value) {
      document.querySelectorAll(`[data-group="${group}"]`)
        .forEach(b => b.classList.toggle('active', b.dataset.value === value));
    }

    function currentEntry() {
      const f = STATE[selected.forecast] || STATE['0h'];
      if (selected.layer === 'Rainfall') {
        return (f.Rainfall && f.Rainfall[selected.rain])
          || {src:null, ts:'No timestamp available', title:'Rainfall'};
      }
      return f[selected.layer] || {src:null, ts:'No timestamp available', title:selected.layer};
    }

    function render() {
      const e = currentEntry();
      document.getElementById('plotTitle').textContent = e.title || selected.layer;
      document.getElementById('plotTs').textContent    = e.ts    || 'No timestamp available';
      const img  = document.getElementById('plotImage');
      const warn = document.getElementById('warning');
      if (e.src) {
        img.style.display  = 'block';
        img.src            = e.src;
        warn.style.display = 'none';
      } else {
        img.style.display  = 'none';
        warn.style.display = 'block';
      }
      setActive('forecast', selected.forecast);
      setActive('layer',    selected.layer);
      setActive('rain',     selected.rain);
      document.getElementById('rainRow').style.display =
        selected.layer === 'Rainfall' ? '' : 'none';
    }

    document.querySelectorAll('[data-group="forecast"]').forEach(btn =>
      btn.onclick = () => { selected.forecast = btn.dataset.value; render(); });
    document.querySelectorAll('[data-group="layer"]').forEach(btn =>
      btn.onclick = () => { selected.layer = btn.dataset.value; render(); });
    document.querySelectorAll('[data-group="rain"]').forEach(btn =>
      btn.onclick = () => { selected.rain = btn.dataset.value; render(); });

    render();
  </script>
</body>
</html>
