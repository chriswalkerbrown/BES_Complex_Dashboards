<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caribbean Weather Dashboard</title>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; background:#101419; color:#e8edf2; margin:0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .card { background:#17202a; border:1px solid #2a3440; border-radius:14px; padding:16px; margin-bottom:14px; }
    h1 { margin:0 0 6px 0; }
    .muted { opacity:.8; }
    .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .btn { background:#243243; border:1px solid #34465a; color:#e8edf2; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .btn.active { background:#2d6cdf; border-color:#2d6cdf; }
    img { width:100%; max-width:980px; border-radius:10px; border:1px solid #2a3440; }
    .warn { color:#ffd479; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Caribbean Weather Dashboard</h1>
      <div><strong>Last updated:</strong> 2026-03-18 13:57 UTC</div>
      <div class="muted">Data source: NAM (NOAA)</div>
    </div>

    <div class="card">
      <div><strong>Forecast Hour</strong></div>
      <div class="row" id="forecastButtons"><button class="btn" data-group="forecast" data-value="0h">0h</button><button class="btn" data-group="forecast" data-value="3h">3h</button><button class="btn" data-group="forecast" data-value="6h">6h</button><button class="btn" data-group="forecast" data-value="12h">12h</button><button class="btn" data-group="forecast" data-value="24h">24h</button><button class="btn" data-group="forecast" data-value="48h">48h</button><button class="btn" data-group="forecast" data-value="72h">72h</button></div>
      <div style="height:8px"></div>
      <div><strong>Layer</strong></div>
      <div class="row" id="layerButtons"><button class="btn" data-group="layer" data-value="Temperature">Temperature</button><button class="btn" data-group="layer" data-value="Wind">Wind</button><button class="btn" data-group="layer" data-value="Rainfall">Rainfall</button></div>
      <div style="height:8px"></div>
      <div><strong>Rainfall Mode</strong></div>
      <div class="row" id="rainButtons"><button class="btn" data-group="rain" data-value="Accumulated">Accumulated</button><button class="btn" data-group="rain" data-value="Rate">Rate</button></div>
    </div>

    <div class="card">
      <h3 id="plotTitle">Regional Temperature</h3>
      <div id="warning" class="warn" style="display:none;">No image found for this selection.</div>
      <img id="plotImage" alt="weather plot" />
      <div style="margin-top:8px"><strong>Updated:</strong> <span id="plotTs"></span></div>
    </div>
  </div>

  <script>
    const STATE = {"0h": {"Temperature": {"src": "static/region_f00.png?v=1773842230", "ts": "2026-03-18 13:56 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f00.png?v=1773842230", "ts": "2026-03-18 13:56 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f00.png?v=1773842230", "ts": "2026-03-18 13:56 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f00.png?v=1773842230", "ts": "2026-03-18 13:56 UTC", "title": "Rainfall Rate"}}}, "3h": {"Temperature": {"src": "static/region_f03.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f03.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f03.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f03.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Rainfall Rate"}}}, "6h": {"Temperature": {"src": "static/region_f06.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f06.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f06.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f06.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Rainfall Rate"}}}, "12h": {"Temperature": {"src": "static/region_f12.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f12.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f12.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f12.png?v=1773842230", "ts": "2026-03-18 13:57 UTC", "title": "Rainfall Rate"}}}, "24h": {"Temperature": {"src": "static/region_f24.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f24.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f24.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f24.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Rainfall Rate"}}}, "48h": {"Temperature": {"src": "static/region_f48.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f48.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f48.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f48.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Rainfall Rate"}}}, "72h": {"Temperature": {"src": "static/region_f72.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Regional Temperature"}, "Wind": {"src": "static/wind_f72.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "10 m Wind Vectors"}, "Rainfall": {"Accumulated": {"src": "static/precip_accum_f72.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Accumulated Rainfall"}, "Rate": {"src": "static/precip_rate_f72.png?v=1773842230", "ts": "2026-03-18 11:38 UTC", "title": "Rainfall Rate"}}}};
    const selected = { forecast: '0h', layer: 'Temperature', rain: 'Accumulated' };

    function setActive(group, value) {
      document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.toggle('active', b.dataset.value===value));
    }

    function currentEntry() {
      const f = STATE[selected.forecast] || STATE['0h'];
      if (selected.layer === 'Rainfall') {
        return (f.Rainfall && f.Rainfall[selected.rain]) || {src:null, ts:'No timestamp available', title:'Rainfall'};
      }
      return f[selected.layer] || {src:null, ts:'No timestamp available', title:selected.layer};
    }

    function render() {
      const e = currentEntry();
      document.getElementById('plotTitle').textContent = e.title || selected.layer;
      document.getElementById('plotTs').textContent = e.ts || 'No timestamp available';
      const img = document.getElementById('plotImage');
      const warn = document.getElementById('warning');
      if (e.src) {
        img.style.display = 'block';
        img.src = e.src;
        warn.style.display = 'none';
      } else {
        img.style.display = 'none';
        warn.style.display = 'block';
      }
      setActive('forecast', selected.forecast);
      setActive('layer', selected.layer);
      setActive('rain', selected.rain);
    }

    document.querySelectorAll('[data-group="forecast"]').forEach(btn => btn.onclick = () => { selected.forecast = btn.dataset.value; render(); });
    document.querySelectorAll('[data-group="layer"]').forEach(btn => btn.onclick = () => { selected.layer = btn.dataset.value; render(); });
    document.querySelectorAll('[data-group="rain"]').forEach(btn => btn.onclick = () => { selected.rain = btn.dataset.value; render(); });

    render();
  </script>
</body>
</html>
