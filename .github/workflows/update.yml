name: Update Weather Maps

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate maps
        run: python update_maps.py

      - name: Build Panel dashboard
        run: python panel_app.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add static/*.png static/*timestamp.txt index.html
          git commit -m "Automated hourly update" || echo "No changes"
          git pull --rebase origin master
          git push origin master

      - name: Ping healthcheck.io (success)
        if: success()
        run: curl -fsS --retry 3 https://hc-ping.com/1257e67a-883c-47f0-98dc-2df1877a39bd > /dev/null

      - name: Ping healthcheck.io (failure)
        if: failure()
        run: curl -fsS --retry 3 https://hc-ping.com/1257e67a-883c-47f0-98dc-2df1877a39bd/fail > /dev/null
